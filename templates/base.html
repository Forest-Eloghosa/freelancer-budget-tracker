{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Budget Tracker</title>

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">
    <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="custom-navbar">
    <div class="custom-navbar-inner">
        <div class="nav-top-row">
            <img src="{% static 'images/logo.png' %}" alt="Freelancer Budget Tracker logo" class="app-logo">

            <button
                class="menu-toggle"
                id="menu-toggle"
                aria-label="Toggle navigation menu"
                aria-expanded="false"
                aria-controls="nav-list"
                type="button"
            >
                ☰
            </button>
        </div>

        <div class="nav-links-wrapper" id="nav-list">
            <div class="nav-links">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'transactions' %}">Transactions</a>
                <a href="{% url 'categories' %}">Categories</a>
            </div>

            <div class="nav-right">
                <a href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </div>
</nav>

{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<footer class="text-center py-4 mt-5 border-top">
    <p class="mb-0">Freelancer Budget Tracker © 2026</p>
    <small class="text-muted">Developed by Forest Eloghosa</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const menuToggle = document.getElementById('menu-toggle');
    const navList = document.getElementById('nav-list');

    menuToggle.addEventListener('click', function () {
        navList.classList.toggle('show');

        const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
        menuToggle.setAttribute('aria-expanded', !expanded);
    });
</script>
</body>
</html>
