{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Budget Tracker</title>
        
    

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">

    <!-- Shortcut favicon (fallback) -->
    <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Custom CSS -->
     <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav style="background:#00327d; padding:15px;">
    <div style="display:flex; align-items:center; gap:20px; color:white;">

        <img src="{% static 'images/logo.png' %}" class="app-logo">

        <a href="/" style="color:white; text-decoration:none;">Dashboard</a>
        <a href="/transactions/" style="color:white; text-decoration:none;">Transactions</a>
        <a href="/categories/" style="color:white; text-decoration:none;">Categories</a>

        <div style="margin-left:auto;">
            <a href="/accounts/logout/" style="color:#10B981; text-decoration:none;">
                Logout
            </a>
        </div>

    </div>
</nav>
    {% block content %}{% endblock %}
</body>
</html>
