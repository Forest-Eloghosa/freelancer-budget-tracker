{% extends "base.html" %}

{% block title %}Sign Up | Freelancer Budget Tracker{% endblock %}

{% block content %}
<div class="container page-content">
    <div class="card mt-4">
        <div class="card-body">
            <h1 class="mb-4">Create Account</h1>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Sign Up
                </button>
            </form>

            <p class="mt-3 mb-0">
                Already have an account?
                <a href="{% url 'login' %}">Sign in here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
