{% extends "base.html" %}

{% block title %}Password Reset Sent | Freelancer Budget Tracker{% endblock %}

        <div class="card-body text-center">
            <h1 class="mb-4">Check Your Email</h1>

                Back to Login

        </div>
    </div>
</div>
{% endblock %}
