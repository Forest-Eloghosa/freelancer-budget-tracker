{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h2 class="mb-4">Edit Category</h2>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-primary rounded-pill px-4">
                    Update Category
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
