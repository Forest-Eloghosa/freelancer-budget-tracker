{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="mb-3">Delete Transaction</h2>
            <p>Are you sure you want to delete this transaction?</p>

            <p><strong>{{ transaction.category.name }}</strong> — €{{ transaction.amount }}</p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger rounded-pill px-4 me-2">
                    Yes, Delete
                </button>
                <a href="{% url 'transactions' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
